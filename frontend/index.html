<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Doutor Riminha 👶🎵</title>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg1:#fff6fb;
      --bg2:#e9f7ff;
      --surface:#ffffff;

      --primary:#ff7eb6;
      --secondary:#6cc8ff;
      --accent:#ffd166;

      --text:#4b4b63;
      --muted:#7d7d96;

      --user-bg:#dff7ff;
      --bot-bg:#fff0f7;

      --border:#e9dff5;

      --shadow:0 10px 30px rgba(0,0,0,.08);

      --radius:24px;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;

      background:
        radial-gradient(circle at top left, #ffd9ec 0%, transparent 30%),
        radial-gradient(circle at bottom right, #d7f1ff 0%, transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));

      font-family:'Nunito',sans-serif;
      color:var(--text);
    }

    .chat-app{
      width:100%;
      max-width:850px;
      height:92vh;

      background:rgba(255,255,255,.9);

      backdrop-filter:blur(10px);

      border:4px solid white;

      border-radius:32px;

      overflow:hidden;

      box-shadow:var(--shadow);

      display:flex;
      flex-direction:column;
    }

    .chat-header{
      padding:22px 28px;

      display:flex;
      align-items:center;
      gap:16px;

      background:linear-gradient(135deg,#ff9ec9,#8ed8ff);

      color:white;
    }

    .avatar{
      width:64px;
      height:64px;

      border-radius:20px;

      background:white;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:32px;

      box-shadow:0 6px 16px rgba(0,0,0,.15);
    }

    .header-info h1{
      font-family:'Baloo 2',cursive;
      font-size:2rem;
      line-height:1;
    }

    .header-info p{
      margin-top:4px;
      font-size:.95rem;
      opacity:.95;
    }

    .header-badge{
      margin-left:auto;

      background:rgba(255,255,255,.2);

      padding:8px 14px;

      border-radius:999px;

      font-weight:700;

      font-size:.8rem;

      backdrop-filter:blur(6px);
    }

    .chat-messages{
      flex:1;
      overflow-y:auto;

      padding:28px 22px;

      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .chat-messages::-webkit-scrollbar{
      width:8px;
    }

    .chat-messages::-webkit-scrollbar-thumb{
      background:#d9d9f3;
      border-radius:999px;
    }

    .welcome{
      text-align:center;
      margin:auto;
      max-width:550px;
    }

    .welcome-icon{
      font-size:5rem;
      margin-bottom:18px;
      display:block;
    }

    .welcome h2{
      font-family:'Baloo 2',cursive;
      font-size:2.3rem;
      color:#ff69a6;
    }

    .welcome p{
      margin-top:12px;
      line-height:1.7;
      color:var(--muted);
      font-size:1rem;
    }

    .suggestions{
      margin-top:28px;

      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
    }

    .suggestion-btn{
      border:none;

      background:white;

      color:#ff69a6;

      padding:12px 18px;

      border-radius:999px;

      cursor:pointer;

      font-weight:700;

      transition:.2s;

      box-shadow:0 6px 16px rgba(0,0,0,.08);
    }

    .suggestion-btn:hover{
      transform:translateY(-2px) scale(1.03);

      background:#ff69a6;
      color:white;
    }

    .msg{
      display:flex;
      gap:12px;
      animation:fade .25s ease;
    }

    .msg.user{
      flex-direction:row-reverse;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .msg-avatar{
      width:42px;
      height:42px;

      border-radius:14px;

      flex-shrink:0;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:22px;
    }

    .msg.bot .msg-avatar{
      background:#ffe3f0;
    }

    .msg.user .msg-avatar{
      background:#dff7ff;
    }

    .msg-bubble{
      max-width:75%;

      padding:16px 18px;

      border-radius:22px;

      line-height:1.7;

      font-size:.96rem;

      box-shadow:0 6px 14px rgba(0,0,0,.05);
    }

    .msg.bot .msg-bubble{
      background:var(--bot-bg);
      border-top-left-radius:6px;
    }

    .msg.user .msg-bubble{
      background:var(--user-bg);
      border-top-right-radius:6px;
    }

    .typing{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .typing span{
      width:9px;
      height:9px;

      border-radius:50%;

      background:#ff8dc1;

      animation:bounce .9s infinite;
    }

    .typing span:nth-child(2){
      animation-delay:.15s;
    }

    .typing span:nth-child(3){
      animation-delay:.3s;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-8px);
      }
    }

    .chat-input-area{
      padding:18px 22px;

      background:white;

      border-top:2px dashed #f0d9ee;
    }

    .input-wrapper{
      display:flex;
      align-items:flex-end;
      gap:12px;

      background:#fff8fc;

      border:2px solid #f5d8e8;

      border-radius:24px;

      padding:12px 14px;
    }

    #user-input{
      flex:1;

      border:none;
      outline:none;
      resize:none;

      background:none;

      font-size:1rem;

      font-family:'Nunito',sans-serif;

      color:var(--text);

      max-height:120px;
    }

    #send-btn{
      width:52px;
      height:52px;

      border:none;

      border-radius:18px;

      background:linear-gradient(135deg,#ff7eb6,#6cc8ff);

      color:white;

      cursor:pointer;

      transition:.2s;

      flex-shrink:0;
    }

    #send-btn:hover{
      transform:scale(1.05);
    }

    .input-hint{
      text-align:right;

      margin-top:8px;

      font-size:.75rem;

      color:#9b90aa;
    }

    .msg-error .msg-bubble{
      background:#ffe5e5;
      color:#d94b4b;
    }

  </style>
</head>

<body>

<div class="chat-app">

  <header class="chat-header">

    <div class="avatar">🩺</div>

    <div class="header-info">
      <h1>Doutor Riminha</h1>
      <p>O pediatra que explica tudo com carinho e riminha 🎵</p>
    </div>

    <div class="header-badge">
      ONLINE ✨
    </div>

  </header>

  <div class="chat-messages" id="chat-messages">

    <div class="welcome" id="welcome">

      <span class="welcome-icon">👶🎶</span>

      <h2>Olá amiguinho!</h2>

      <p>
        Eu sou o Doutor Riminha! 🩺✨<br>
        Posso responder perguntas infantis com saúde, alegria e muita rima divertida!
      </p>

      <div class="suggestions">

        <button class="suggestion-btn" onclick="useSuggestion(this)">
          Por que precisamos escovar os dentes?
        </button>

        <button class="suggestion-btn" onclick="useSuggestion(this)">
          O que acontece quando temos febre?
        </button>

        <button class="suggestion-btn" onclick="useSuggestion(this)">
          Por que dormir é importante?
        </button>

        <button class="suggestion-btn" onclick="useSuggestion(this)">
          Explique alimentação saudável
        </button>

      </div>

    </div>

  </div>

  <div class="chat-input-area">

    <div class="input-wrapper">

      <textarea
        id="user-input"
        rows="1"
        placeholder="Pergunte algo ao Doutor Riminha..."
      ></textarea>

      <button id="send-btn">
        Enviar
      </button>

    </div>

    <div class="input-hint">
      Enter para enviar · Shift+Enter para nova linha
    </div>

  </div>

</div>

<script>

const historico = [];
let aguardando = false;

const messagesEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');

inputEl.addEventListener('keydown', (e) => {

  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    enviarMensagem();
  }

});

sendBtn.addEventListener('click', enviarMensagem);

function useSuggestion(btn){
  inputEl.value = btn.textContent;
  enviarMensagem();
}

function addMessage(texto,tipo){

  if(welcomeEl){
    welcomeEl.remove();
  }

  const div = document.createElement('div');

  div.className = `msg ${tipo}`;

  const avatar =
    tipo === 'user'
    ? '🧒'
    : '🩺';

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>

    <div class="msg-bubble">
      ${texto}
    </div>
  `;

  messagesEl.appendChild(div);

  messagesEl.scrollTop =
    messagesEl.scrollHeight;

  return div;
}

function showTyping(){

  const div = document.createElement('div');

  div.className = 'msg bot';

  div.id = 'typing-indicator';

  div.innerHTML = `
    <div class="msg-avatar">🩺</div>

    <div class="msg-bubble">
      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;

  messagesEl.appendChild(div);

  messagesEl.scrollTop =
    messagesEl.scrollHeight;
}

function hideTyping(){

  const el =
    document.getElementById('typing-indicator');

  if(el){
    el.remove();
  }
}

async function enviarMensagem(){

  const texto =
    inputEl.value.trim();

  if(!texto || aguardando){
    return;
  }

  inputEl.value = '';

  addMessage(texto,'user');

  historico.push({
    role:'user',
    content:texto
  });

  aguardando = true;

  sendBtn.disabled = true;

  showTyping();

  try{

    const response =
      await fetch('/chat', {
        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          mensagem:texto,
          historico:historico.slice(0,-1)
        })
      });

    const data =
      await response.json();

    if(!response.ok || data.erro){
      throw new Error(
        data.erro || 'Erro desconhecido'
      );
    }

    historico.push({
      role:'assistant',
      content:data.resposta
    });

    hideTyping();

    addMessage(data.resposta,'bot');

  }catch(err){

    hideTyping();

    const errDiv =
      addMessage(
        `⚠️ ${err.message}`,
        'bot'
      );

    errDiv.classList.add('msg-error');

  }finally{

    aguardando = false;

    sendBtn.disabled = false;

    inputEl.focus();
  }
}

</script>

</body>
</html>
